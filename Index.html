<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotogram</title>
    <link rel="icon" href="assets/icon/Group.svg" type="image/svg+xml">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body onload="initGallery()">
    <header class="page-header">
        <a href="index.html" class="header-logo-link" aria-label="Zur Startseite">
            <img src="assets/icon/Group.svg" alt="Fotogram Logo" class="logo">
            <span class="brand-title">Fotogram</span>
        </a>
    </header>
    <main class="main-content">
        <h1>Welcome to Fotogram</h1>
        <h2>Your personal photo album</h2>
        <section id="gallery" class="gallery-grid" aria-label="Photo Gallery"></section>
    </main>
    <footer class="page-footer">
        <div class="footer-content">
            <a href="https://developerakademie.com/" class="footer-link-box"
                aria-label="Besuche die Website der Developer Akademie">
                <img src="assets/icon/Icon.svg" alt="Logo der Developer Akademie" class="footer-logo">
                <div class="footer-center-text">
                    <span class="footer-brand notranslate">Developer<br>Akademie</span>
                </div>
            </a>
            <a href="imprint.html" class="footer-text">&copy; 2026 Fotogram. All rights reserved.</a>
        </div>
    </footer>
    <dialog id="lightbox-modal" class="lightbox-dialog" onclick="handleModalClick(event)"></dialog>
</body>

</html>
